<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Digital</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
  body { background: #f5f5f5; padding: 16px; }
  .header { text-align: center; margin-bottom: 20px; }
  .header h1 { color: #d35400; }
  .admin-btn { position: fixed; bottom: 16px; right: 16px; background: #2c3e50; color: white; border: none; padding: 12px 18px; border-radius: 50px; cursor: pointer; font-size: 14px; }
  
  /* Vista cliente */
  .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-width: 1000px; margin: 0 auto; }
  .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .card img { width: 100%; height: 180px; object-fit: cover; }
  .card-body { padding: 14px; }
  .card h3 { color: #2c3e50; margin-bottom: 6px; }
  .card p { color: #666; font-size: 14px; margin-bottom: 10px; }
  .price { color: #d35400; font-weight: bold; font-size: 18px; }
  
  /* Panel admin */
  .admin-panel { display: none; max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; }
  .admin-panel.active { display: block; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; margin-bottom: 4px; font-weight: 600; }
  .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
  .btn { background: #d35400; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-right: 8px; }
  .btn-secondary { background: #7f8c8d; }
  .btn-danger { background: #c0392b; }
  .item-list { margin-top: 20px; }
  .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
  .qr-section { text-align: center; margin-top: 20px; padding: 20px; background: #f9f9f9; border-radius: 12px; }
  #qrcode { display: inline-block; margin-top: 10px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <h1>🍽️ Nuestro Menú</h1>
  <p>Escanea el QR o navega aquí</p>
</div>

<!-- VISTA CLIENTE -->
<div id="clientView" class="menu-grid"></div>

<!-- BOTÓN ADMIN -->
<button class="admin-btn" onclick="toggleAdmin()">️ Admin</button>

<!-- PANEL ADMIN -->
<div id="adminPanel" class="admin-panel">
  <h2>Panel de Administración</h2>
  <div id="loginForm">
    <div class="form-group">
      <label>Contraseña:</label>
      <input type="password" id="adminPass" placeholder="Ingresa la contraseña">
    </div>
    <button class="btn" onclick="login()">Entrar</button>
  </div>
  
  <div id="adminContent" class="hidden">
    <h3>Agregar producto</h3>
    <div class="form-group">
      <label>Nombre:</label>
      <input type="text" id="prodName">
    </div>
    <div class="form-group">
      <label>Descripción:</label>
      <textarea id="prodDesc" rows="2"></textarea>
    </div>
    <div class="form-group">
      <label>Precio:</label>
      <input type="number" id="prodPrice" step="0.01">
    </div>
    <div class="form-group">
      <label>URL de imagen (o déjalo vacío para usar la de ejemplo):</label>
      <input type="text" id="prodImg" placeholder="https://...">
    </div>
    <button class="btn" onclick="addProduct()">➕ Agregar</button>
    <button class="btn btn-secondary" onclick="logout()">Salir</button>
    
    <div class="item-list">
      <h3>Productos actuales</h3>
      <div id="itemList"></div>
    </div>
    
    <div class="qr-section">
      <h3>📱 Código QR de tu menú</h3>
      <p>Imprímelo y pégalo en tu local</p>
      <div id="qrcode"></div>
      <p style="margin-top:10px; font-size:12px; color:#666;" id="qrUrl"></p>
    </div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = "menu2026"; // Cámbiala
const DEFAULT_IMG = "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500";

let products = JSON.parse(localStorage.getItem("menu_products") || "[]");

// Si no hay productos, cargar ejemplos
if (products.length === 0) {
  products = [
    { id: 1, name: "Hamburguesa Clásica", desc: "Carne 200g, queso, lechuga, tomate", price: 5.50, img: DEFAULT_IMG },
    { id: 2, name: "Papas Fritas", desc: "Crujientes con sal marina", price: 2.50, img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=500" },
    { id: 3, name: "Refresco", desc: "500ml", price: 1.50, img: "https://images.unsplash.com/photo-1581098365948-6a5a918b6591?w=500" }
  ];
  saveProducts();
}

function saveProducts() {
  localStorage.setItem("menu_products", JSON.stringify(products));
}

function renderMenu() {
  const grid = document.getElementById("clientView");
  grid.innerHTML = products.map(p => `
    <div class="card">
      <img src="${p.img}" alt="${p.name}" onerror="this.src='${DEFAULT_IMG}'">
      <div class="card-body">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <div class="price">$${parseFloat(p.price).toFixed(2)}</div>
      </div>
    </div>
  `).join("");
}

function renderItemList() {
  const list = document.getElementById("itemList");
  list.innerHTML = products.map(p => `
    <div class="item-row">
      <span><strong>${p.name}</strong> - $${parseFloat(p.price).toFixed(2)}</span>
      <button class="btn btn-danger" onclick="deleteProduct(${p.id})">🗑️</button>
    </div>
  `).join("");
}

function addProduct() {
  const name = document.getElementById("prodName").value.trim();
  const desc = document.getElementById("prodDesc").value.trim();
  const price = parseFloat(document.getElementById("prodPrice").value);
  const img = document.getElementById("prodImg").value.trim() || DEFAULT_IMG;
  
  if (!name || isNaN(price)) { alert("Nombre y precio son obligatorios"); return; }
  
  products.push({ id: Date.now(), name, desc, price, img });
  saveProducts();
  renderMenu();
  renderItemList();
  
  document.getElementById("prodName").value = "";
  document.getElementById("prodDesc").value = "";
  document.getElementById("prodPrice").value = "";
  document.getElementById("prodImg").value = "";
}

function deleteProduct(id) {
  if (confirm("¿Eliminar este producto?")) {
    products = products.filter(p => p.id !== id);
    saveProducts();
    renderMenu();
    renderItemList();
  }
}

function toggleAdmin() {
  const panel = document.getElementById("adminPanel");
  panel.classList.toggle("active");
  if (panel.classList.contains("active")) {
    document.getElementById("clientView").classList.add("hidden");
  } else {
    document.getElementById("clientView").classList.remove("hidden");
  }
}

function login() {
  if (document.getElementById("adminPass").value === ADMIN_PASSWORD) {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("adminContent").classList.remove("hidden");
    renderItemList();
    generateQR();
  } else {
    alert("Contraseña incorrecta");
  }
}

function logout() {
  document.getElementById("loginForm").classList.remove("hidden");
  document.getElementById("adminContent").classList.add("hidden");
  document.getElementById("adminPass").value = "";
  document.getElementById("adminPanel").classList.remove("active");
  document.getElementById("clientView").classList.remove("hidden");
}

function generateQR() {
  const qrDiv = document.getElementById("qrcode");
  qrDiv.innerHTML = "";
  const url = window.location.href;
  new QRCode(qrDiv, { text: url, width: 200, height: 200 });
  document.getElementById("qrUrl").textContent = url;
}

renderMenu();
</script>
</body>
</html>
